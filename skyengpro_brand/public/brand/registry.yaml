# SkyEngPro brand asset register
# Single source of truth for every brand asset shipped in this app.
# Keep alphabetical by id. Bump version on any visual change.
#
# Schema:
#   id            stable identifier — referenced from theme.py, never reused
#   filename      relative to skyengpro_brand/public/
#   entity        slug: skyengpro | ali_capital | mc_capital | adorsys
#   type          logo | icon | letterhead | favicon
#   variant       horizontal | tagline | mark | white | color
#   size          intrinsic size (px) of the source asset
#   version       bump on visual change; old asset goes to archive/
#   owner         person responsible for this asset
#   source        path or URL of the editable source (.ai / .fig / Figma link)
#   license       proprietary | cc-by | etc
#   where_used    free-form list of consumers
#   status        active | deprecated | placeholder

assets:
